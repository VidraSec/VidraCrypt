<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Decrypt file</title>
<link rel="stylesheet" href="styles.css" integrity="sha384-fQFY4SU4qiqXJeVzBYMvstn19viKq7sFqz/rMq+VfkcdclWuLbwPQfeMVJEipSHC" crossorigin="anonymous">
<script src="age-0.3.0.js" integrity="sha384-f4/FKfd7+2kZbT6B1WuwM3gqK8KZtP2+il4WJ8CoSxesW9EetMPR0m/D8vL0Wfc/" crossorigin="anonymous"></script>
<script src="decrypt.js" defer integrity="sha384-XhGfvf3lDkucU3RD4lrvb7LKMFE/q5nLfGv/N6gZfChVC6Qd+wa0FtwQPMi1Iu34" crossorigin="anonymous"></script>
</head>
<body>
<main class="card">
<h1>Decrypt file</h1>
<p class="info">Files are decrypted using age directly in your browser. The server never sees your passphrase or the decrypted content.</p>

<form id="decryptForm">
  <label for="pass" class="label">Passphrase</label>
  <input id="pass" type="password" placeholder="Enter passphrase" autocomplete="one-time-password" required aria-describedby="status" autocapitalize="off" spellcheck="false">
  <button id="decryptBtn" type="submit" class="btn">Decrypt</button>
</form>
<div id="status" class="status" role="status" aria-live="polite" aria-atomic="true"></div>

<footer class="footer">Developed by <a href="https://www.vidrasec.com/" target="_blank" rel="noopener">VidraSec</a> &middot; <a href="https://github.com/VidraSec/VidraCrypt" target="_blank" rel="noopener">Source code on GitHub</a></footer>
</main>
</body>
</html>
